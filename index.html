<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A SECRET GARDEN 🌿</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-green: #e8f3e8;
            --warm-pink: #ffdae0;
            --accent-brown: #8d775f;
            --main-bg: #fdfaf4;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--main-bg);
            color: var(--accent-brown);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .entry-container {
            position: relative;
            text-align: center;
            padding: 50px;
            max-width: 600px;
            z-index: 10;
        }

        h1 {
            font-family: 'Varela Round', sans-serif;
            font-size: 4.5rem;
            line-height: 1.1;
            margin-bottom: 30px;
            color: #6b8e6b;
            text-shadow: 2px 2px white;
        }

        .cute-btn {
            background: var(--warm-pink);
            border: none;
            padding: 20px 45px;
            border-radius: 50px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 1.5rem;
            color: #b56576;
            cursor: pointer;
            box-shadow: 0 6px 0 #efb1bd;
            transition: all 0.2s ease-in-out;
            display: inline-block;
        }

        .cute-btn:active {
            box-shadow: 0 0 0;
            transform: translateY(6px);
        }

        /* Decoration */
        .decoration {
            position: fixed;
            font-size: 6rem;
            pointer-events: none;
            z-index: 1;
            opacity: 0.8;
        }
        .top-left { top: -20px; left: -20px; }
        .top-right { top: -20px; right: -20px; }
        .bottom-left { bottom: -20px; left: -20px; }
        .bottom-right { bottom: -20px; right: -20px; }

        .kitty-row {
            margin-top: 40px;
            font-size: 2rem;
        }
    </style>
</head>
<body>

    <div class="decoration top-left">🌿🌸</div>
    <div class="decoration top-right">🌸🌿</div>
    <div class="decoration bottom-left">🌿🌸</div>
    <div class="decoration bottom-right">🌸🌿</div>

    <div class="entry-container">
        <h1>HELLO MY LOVE!!!!!</h1>

        <button class="cute-btn" onclick="checkPassword()">
            LETS GO! 🐾
        </button>

        <div class="kitty-row">
            🐱 🐈 🐈‍⬛ 😽 🐾 🎀
        </div>
    </div>

    <script>
        function checkPassword() {
            // YOU CAN CHANGE THE PASSWORD HERE! 
            // Right now it is: love
            var password = prompt("Enter the secret code to enter the garden! 🌸", "");

            if (password === "love") {
                alert("Correct! Welcome home, Cutie !! ✨");
                window.location.href = "photos.html"; 
            } else {
                alert("Oops! Only my favorite person knows the code... Try again! 🐱");
            }
        }
    </script>

</body>
</html>
