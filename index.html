<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A SECRET GARDEN 🌿</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-green: #e8f3e8;
            --warm-pink: #ffdae0;
            --accent-brown: #8d775f;
            --main-bg: #fdfaf4; /* Soft cream background */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--main-bg);
            color: var(--accent-brown);
            overflow: hidden; /* No scrolling on this page */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- Full Screen Container --- */
        .entry-container {
            position: relative;
            text-align: center;
            padding: 50px;
            max-width: 600px;
        }

        /* --- Ghibli-Style Text --- */
        h1 {
            font-family: 'Varela Round', sans-serif;
            font-size: 4.5rem;
            line-height: 1.1;
            margin-bottom: 30px;
            color: #6b8e6b; /* Soft green */
            text-shadow: 2px 2px white, 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* --- The Button --- */
        .cute-btn {
            background: var(--warm-pink);
            border: none;
            padding: 20px 45px;
            margin: 10px;
            border-radius: 50px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 1.5rem;
            color: #b56576;
            cursor: pointer;
            box-shadow: 0 6px 0 #efb1bd;
            transition: all 0.2s ease-in-out;
            text-decoration: none; /* For the link */
            display: inline-block;
        }

        .cute-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 0 #efb1bd;
        }

        .cute-btn:active {
            box-shadow: 0 0 0;
            transform: translateY(6px);
        }

        /* --- Corner Decorative Flowers --- */
        .decoration {
            position: fixed;
            font-size: 6rem;
            pointer-events: none;
            z-index: -1;
            opacity: 0.8;
        }

        /* Top corners */
        .top-left { top: -20px; left: -20px; }
        .top-right { top: -20px; right: -20px; }

        /* Bottom corners */
        .bottom-left { bottom: -20px; left: -20px; }
        .bottom-right { bottom: -20px; right: -20px; }

        /* Kitties! (using cute Unicode emojis) */
        .kitty {
            font-size: 1.5rem;
            margin: 0 5px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="decoration top-left">🌿🌸</div>
    <div class="decoration top-right">🌸🌿</div>
    <div class="decoration bottom-left">🌿🌸</div>
    <div class="decoration bottom-right">🌸🌿</div>

    <div class="entry-container">
        <h1>HELLO MY LOVE!!!!!</h1>

        <a href="photos.html" class="cute-btn">
            LETS GO! 🐾
        </a>

        <p style="margin-top: 40px; color: #a18e7e;">
            <span class="kitty">🐱</span>
            <span class="kitty">🐈</span>
            <span class="kitty">🐈‍⬛</span>
            <span class="kitty">😽</span>
        </p>
    </div>

</body>
</html>
