<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOR THE LOVE OF MY LIFE!!! 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #a8d5ba;
            --soft-pink: #ffdae0;
            --deep-rose: #b56576;
            /* Bold Wood Colors for Visibility */
            --frame-border: #3d1c02; 
            --frame-main: #5c2e0e;
            --sill-color: #7a431d;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: #e0f2fe;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- EMOJIS (High Z-Index) --- */
        .floater { position: fixed; pointer-events: none; z-index: 9999; animation: driftUp 6s linear forwards; font-size: 2rem; }
        @keyframes driftUp { 0% { transform: translateY(110vh); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-20vh); opacity: 0; } }

        .page { position: absolute; width: 95%; max-width: 500px; display: none; flex-direction: column; align-items: center; z-index: 20; }
        .active { display: flex; animation: pop 0.5s ease; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .glass-card {
            background: white; padding: 25px; border-radius: 30px; 
            border: 5px solid var(--soft-pink); width: 100%; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* --- GRADUATION WINDOW (THE "WOODEN OUTLET") --- */
        .window-container {
            position: relative;
            width: 280px;
            margin: 20px auto;
            padding-bottom: 30px; /* Space for the sill ledge */
        }

        .heavy-frame {
            background: var(--frame-main);
            border: 12px solid var(--frame-border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 8px;
            padding: 8px;
            width: 100%;
            height: 240px;
            box-sizing: border-box;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        /* The Horizontal and Vertical Wood Bars */
        .heavy-frame::before { content: ""; position: absolute; top: 0; left: 50%; width: 10px; height: 100%; background: var(--frame-border); transform: translateX(-50%); z-index: 5; }
        .heavy-frame::after { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 10px; background: var(--frame-border); transform: translateY(-50%); z-index: 5; }

        /* The 3D Windowsill Ledge */
        .sill-ledge {
            position: absolute;
            bottom: 5px;
            left: -15px;
            width: calc(100% + 30px);
            height: 25px;
            background: var(--sill-color);
            border: 3px solid var(--frame-border);
            border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .pane-img {
            background: #0a192f; /* Deep night sky behind glass */
            overflow: hidden;
            position: relative;
        }
        .pane-img img { width: 100%; height: 100%; object-fit: cover; }
        /* Glass Reflection */
        .pane-img::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        /* --- BUTTONS & UI --- */
        .nav-btn { background: var(--deep-rose); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 5px; font-size: 1rem; }
        .msg { font-size: 0.9rem; font-weight: 600; color: #333; margin: 15px 0; line-height: 1.4; }
        
        /* Zoom on click */
        .zoomed { transform: scale(1.5); z-index: 1000; transition: 0.3s; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="p1" class="page active">
        <div class="glass-card">
            <h1 style="color: var(--deep-rose);">HI BABY! ❤️</h1>
            <button class="nav-btn" onclick="start()">OPEN YOUR GIFT 🎁</button>
        </div>
    </div>

    <div id="p6" class="page">
        <div class="glass-card">
            <h1 style="color: var(--deep-rose); margin:0;">GRADUATION!! 🎓</h1>
            
            <div class="window-container">
                <div class="heavy-frame" id="windowFrame" onclick="this.classList.toggle('zoomed')">
                    <div class="pane-img"><img src="grad1.jpg"></div>
                    <div class="pane-img"></div> <div class="pane-img"></div> <div class="pane-img"><img src="grad2.jpg"></div>
                </div>
                <div class="sill-ledge"></div> 
            </div>

            <div class="msg">I am so proud of you, my graduate! You worked so hard and look at you now. I love you more than words can say! 💖🎉</div>
            
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="nav-btn" onclick="location.reload()" style="background: #666;">Restart 🐾</button>
            </div>
        </div>
    </div>

    <script>
        function start() {
            document.getElementById('bgMusic').play().catch(e => console.log("Music blocked"));
            document.getElementById('p1').style.display = 'none';
            document.getElementById('p6').style.display = 'flex'; // Skipping straight to p6 for you to see it
            fire();
        }

        function fire() {
            for(let i=0; i<30; i++) {
                setTimeout(spawn, i * 100);
            }
        }

        function spawn() {
            const icons = ['🎓', '✨', '💖', '🎀', '🎉', '📜'];
            const f = document.createElement('div');
            f.className = 'floater';
            f.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            f.style.left = (Math.random() * 90) + 'vw';
            f.style.top = '110vh';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 6000);
        }
    </script>
</body>
</html>
